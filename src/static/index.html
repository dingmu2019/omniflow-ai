<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniFlow AI</title>
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    <link rel="icon" href="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=A%20highly%20aesthetic%2C%20colorful%2C%20glowing%20orb%20or%20sound%20wave%20abstract%20logo%20for%20an%20AI%20communication%20platform%20named%20OmniFlow%2C%20dark%20background%2C%20neon%20blue%20and%20purple%20gradients%2C%20modern%20tech%20startup%20style%2C%203d%20render&image_size=square">
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-body: #000000;
            --bg-container: #111111;
            --bg-container-rgb: 17, 17, 17;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: rgba(255,255,255,0.1);
            --header-bg: rgba(17,17,17,0.85);
            --chat-bg: #0a0a0a;
            --bubble-user: #07c160; /* WeChat Green */
            --bubble-user-text: #ffffff;
            --bubble-agent: #2c2c2c;
            --bubble-agent-text: #ffffff;
            --bottom-bar-bg: #1a1a1a;
            --input-bg: #2c2c2c;
            --icon-color: #ffffff;
            --hover-bg: rgba(255,255,255,0.1);
            --call-bg: #1a1a1a;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --bg-container-rgb: 255, 255, 255;
            --text-main: #000000;
            --text-muted: #999999;
            --border-color: rgba(0,0,0,0.1);
            --header-bg: rgba(245,245,245,0.85);
            --chat-bg: #f5f5f5;
            --bubble-user: #95ec69; /* WeChat Green Light */
            --bubble-user-text: #000000;
            --bubble-agent: #ffffff;
            --bubble-agent-text: #000000;
            --bottom-bar-bg: #f5f5f5;
            --input-bg: #ffffff;
            --icon-color: #333333;
            --hover-bg: rgba(0,0,0,0.05);
            --call-bg: #222222; /* Call UI is usually always dark */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center;
            height: 100vh;
            /* iOS Safe Area */
            height: -webkit-fill-available;
            overflow: hidden;
            transition: background 0.3s;
        }

        .mobile-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: var(--bg-container);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Header */
            height: 56px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }
        .header-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        .header-actions { display: flex; gap: 10px; }
        .icon-btn { 
            background: transparent; border: none; color: var(--icon-color); 
            font-size: 20px; cursor: pointer; padding: 5px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .icon-btn:hover { background: var(--hover-bg); }
        .logo { width: 24px; height: 24px; border-radius: 6px; }

        /* Chat Area */
        .chat-area {
            flex: 1;
            background: var(--chat-bg);
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sys-msg { align-self: center; font-size: 12px; color: var(--text-muted); background: var(--hover-bg); padding: 4px 12px; border-radius: 12px; }
        
        /* Chat Bubbles Fluid Animation */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(15px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .chat-row { 
            display: flex; gap: 10px; align-items: flex-start; 
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        .chat-row.user { flex-direction: row-reverse; }
        
        .avatar { width: 40px; height: 40px; border-radius: 6px; background: #ddd; flex-shrink: 0; overflow: hidden;}
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .bubble-wrapper { display: flex; flex-direction: column; max-width: 70%; }
        .chat-row.user .bubble-wrapper { align-items: flex-end; }
        
        .chat-bubble { 
            padding: 10px 14px; 
            border-radius: 8px; 
            font-size: 15px; 
            line-height: 1.5; 
            word-wrap: break-word; 
            position: relative;
        }
        .chat-row.user .chat-bubble { 
            background: var(--bubble-user); 
            color: var(--bubble-user-text); 
            border-top-right-radius: 2px;
        }
        .chat-row.agent .chat-bubble { 
            background: var(--bubble-agent); 
            color: var(--bubble-agent-text); 
            border-top-left-radius: 2px;
        }
        .chat-image { max-width: 100%; border-radius: 6px; margin-top: 5px; display: block; }

        /* Bottom Bar (Pill Shape Input) */
        .bottom-bar {
            background: var(--bottom-bar-bg);
            border-top: 1px solid var(--border-color);
            padding: 12px 15px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-row { 
            display: flex; align-items: flex-end; gap: 10px; 
        }
        .input-wrapper {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px; /* Pill shape */
            display: flex;
            align-items: flex-end;
            padding: 4px 6px 4px 16px;
            transition: border 0.3s ease;
        }
        .input-wrapper:focus-within {
            border-color: #07c160;
        }
        .input-box {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            min-height: 22px;
            max-height: 100px;
            overflow-y: auto;
            word-break: break-all;
            padding: 8px 0;
            line-height: 1.4;
        }
        .input-box:empty:before { content: attr(placeholder); color: var(--text-muted); pointer-events: none; display: block; }
        
        .voice-btn {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            font-size: 15px;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            transition: background 0.2s, transform 0.1s;
        }
        .voice-btn.active {
            background: var(--hover-bg);
            transform: scale(0.98);
        }
        
        .send-btn {
            background: #07c160; color: white; border: none; border-radius: 50%;
            width: 32px; height: 32px; font-size: 16px; cursor: pointer; 
            display: none; align-items: center; justify-content: center;
            flex-shrink: 0; margin-bottom: 2px;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .send-btn:active { transform: scale(0.9); }
        .plus-btn {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; padding: 0; margin-bottom: 2px;
            transition: color 0.2s;
        }
        .plus-btn:hover { color: var(--text-main); }
        
        .action-panel {
            display: none;
            padding: 15px 0 5px 0;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            border-top: 1px solid var(--border-color);
        }
        .action-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; color: var(--text-muted); font-size: 12px;
        }
        .action-icon {
            width: 56px; height: 56px; background: var(--input-bg); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            border: 1px solid var(--border-color);
        }

        /* Call Overlay (Native Call Style) */
        .call-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--call-bg); z-index: 200;
            display: none; flex-direction: column; color: white;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .call-overlay.active { transform: translateY(0); }
        
        .call-header { padding: 20px; display: flex; justify-content: space-between; }
        .call-header button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        
        .call-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .orb { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #4a90e2, #000); box-shadow: 0 0 20px #4a90e2; animation: pulse 2s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 10px #4a90e2; } 100% { transform: scale(1.05); box-shadow: 0 0 40px #4a90e2; } }
        
        #remoteVideo { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 1;}
        #localVideoCall { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; background: #000; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); object-fit: cover; z-index: 5; display: none;}
        
        .subtitle {
            position: absolute; bottom: 30px; width: 90%; text-align: center;
            font-size: 18px; font-weight: 500; color: white; text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 12px; backdrop-filter: blur(5px);
            opacity: 0; transition: opacity 0.3s; z-index: 10;
        }

        .call-footer { padding: 40px 30px; display: flex; justify-content: space-around; align-items: center; z-index: 10;}
        .call-btn { width: 64px; height: 64px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; color: white; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        .call-btn.danger { background: #ff3b30; }
        .call-btn.success { background: #34c759; }

        /* Settings Modal (Apple Style) */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 300; display: none; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal { background: rgba(var(--bg-container-rgb), 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 25px 20px 40px; width: 100%; box-sizing: border-box; color: var(--text-main); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.15); border-top: 1px solid var(--border-color); }
        .modal-overlay.show { opacity: 1; }
        .modal-overlay.show .modal { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .modal-close { background: rgba(255,255,255,0.1); color: #fff; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .modal-close:hover { background: rgba(255,255,255,0.2); }
        [data-theme="light"] .modal-close { background: rgba(0,0,0,0.05); color: #333; }
        [data-theme="light"] .modal-close:hover { background: rgba(0,0,0,0.1); }
        .setting-group { background: var(--input-bg); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
        .setting-item:last-child { border-bottom: none; }
        .setting-item label { font-size: 15px; color: var(--text-main); font-weight: 500; }
        .setting-item select { background: transparent; border: none; color: var(--text-muted); font-size: 15px; outline: none; text-align: right; direction: rtl; appearance: none; -webkit-appearance: none; cursor: pointer; }
        .setting-textarea { width: 100%; box-sizing: border-box; background: var(--input-bg); border: none; color: var(--text-main); padding: 16px; font-family: inherit; font-size: 14px; outline: none; resize: vertical; min-height: 80px; border-radius: 12px; line-height: 1.5; }
        .setting-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; padding: 0 10px; }
        
        /* Floating Mini Call */
        .floating-call {
            position: absolute; top: 70px; right: 15px; background: #07c160; color: white;
            padding: 8px 12px; border-radius: 20px; font-size: 13px; display: none;
            align-items: center; gap: 6px; cursor: pointer; z-index: 90; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Recording Overlay */
        .recording-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px 30px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .recording-overlay.active { opacity: 1; }
        .recording-wave { display: flex; gap: 4px; height: 30px; align-items: center; }
        .recording-wave span { width: 4px; background: #07c160; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .recording-wave span:nth-child(1) { animation-delay: 0.0s; height: 10px; }
        .recording-wave span:nth-child(2) { animation-delay: 0.1s; height: 20px; }
        .recording-wave span:nth-child(3) { animation-delay: 0.2s; height: 30px; }
        .recording-wave span:nth-child(4) { animation-delay: 0.3s; height: 20px; }
        .recording-wave span:nth-child(5) { animation-delay: 0.4s; height: 10px; }
        @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } }

        /* Incoming Call UI */
        .incoming-call-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-container); z-index: 250;
            display: none; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 60px 0 40px; box-sizing: border-box;
            opacity: 0; transition: opacity 0.3s;
        }
        .incoming-call-ui.active { opacity: 1; }
        .incoming-avatar { width: 100px; height: 100px; border-radius: 16px; margin-bottom: 20px; background: #ddd; }
        .incoming-title { font-size: 24px; font-weight: 600; margin-bottom: 10px; }
        .incoming-desc { font-size: 16px; color: var(--text-muted); }
        .incoming-actions { display: flex; gap: 60px; width: 100%; justify-content: center; }
        .action-btn-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .action-btn-wrapper span { font-size: 14px; color: var(--text-muted); }

    </style>
</head>
<body>

<div class="mobile-container">
    
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <img src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=A%20highly%20aesthetic%2C%20colorful%2C%20glowing%20orb%20or%20sound%20wave%20abstract%20logo%20for%20an%20AI%20communication%20platform%20named%20OmniFlow%2C%20dark%20background%2C%20neon%20blue%20and%20purple%20gradients%2C%20modern%20tech%20startup%20style%2C%203d%20render&image_size=square" class="logo">
            <span data-i18n="title">OmniFlow AI</span>
        </div>
        <div class="header-actions">
            <!-- Jobs Logic: Hide low-frequency actions, keep only one entry point -->
            <button class="icon-btn" id="settingsBtn" title="Settings" style="font-size: 24px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
            </button>
        </div>
    </div>

    <!-- Floating Call Indicator -->
    <div class="floating-call" id="floatingCall" onclick="showCallOverlay()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg> 
        <span data-i18n="calling">通话中...</span>
    </div>

    <!-- Chat History -->
    <div class="chat-area" id="chatHistory">
        <div class="sys-msg" data-i18n="sys_welcome">随时发送文字、图片，或发起语音/视频通话</div>
    </div>

    <!-- Bottom Input Bar -->
    <div class="bottom-bar">
        <div class="input-row">
            <button class="icon-btn" id="modeToggleBtn" style="font-size: 24px; color: var(--text-muted);">
                <!-- Voice Mode Icon (Microphone) -->
                <svg id="micIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                <!-- Keyboard Mode Icon -->
                <svg id="kbdIcon" style="display:none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="6" y1="8" x2="6.01" y2="8"></line><line x1="10" y1="8" x2="10.01" y2="8"></line><line x1="14" y1="8" x2="14.01" y2="8"></line><line x1="18" y1="8" x2="18.01" y2="8"></line><line x1="6" y1="12" x2="6.01" y2="12"></line><line x1="10" y1="12" x2="10.01" y2="12"></line><line x1="14" y1="12" x2="14.01" y2="12"></line><line x1="18" y1="12" x2="18.01" y2="12"></line><line x1="8" y1="16" x2="16" y2="16"></line></svg>
            </button>
            <div class="input-wrapper" id="textInputWrapper">
                <div class="input-box" id="msgInput" contenteditable="true" data-i18n-placeholder="placeholder"></div>
            </div>
            <button class="voice-btn" id="voiceBtn" style="display:none;" data-i18n="hold_to_talk">按住 说话</button>
            <button class="icon-btn" id="plusBtn" style="font-size: 26px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="send-btn" id="sendBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        <div class="action-panel" id="actionPanel">
            <div class="action-item" id="uploadAction">
                <div class="action-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                </div>
                <span data-i18n="album">相册</span>
                <input type="file" id="fileInput" style="display:none" accept="image/*">
            </div>
            <div class="action-item" id="voiceCallAction">
                <div class="action-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
                <span data-i18n="voice_call">语音通话</span>
            </div>
            <div class="action-item" id="videoCallAction">
                <div class="action-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                </div>
                <span data-i18n="video_call">视频通话</span>
            </div>
            <div class="action-item" id="simulateCallAction">
                <div class="action-icon" style="color: #ff9500;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
                <span data-i18n="simulate_call">模拟来电</span>
            </div>
        </div>
    </div>

    <!-- Call Overlay -->
    <div class="call-overlay" id="callOverlay">
        <div class="call-header">
            <button onclick="hideCallOverlay()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div id="callStatus" style="font-size: 14px; opacity: 0.8; margin-top: 5px;" data-i18n="connecting">连接中...</div>
            <div style="width: 24px;"></div> <!-- Spacer -->
        </div>
        <div class="call-body">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideoCall" autoplay muted playsinline></video>
            <div class="orb" id="callOrb"></div>
            <div class="subtitle" id="subtitle"></div>
        </div>
        <div class="call-footer">
            <button class="call-btn" id="muteBtn">
                <svg id="muteIcon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                <svg id="unmuteIcon" style="display:none;" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 1.67"></path><path d="M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <button class="call-btn danger" id="hangupBtn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(135deg);"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </button>
            <button class="call-btn" id="camToggleBtn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 data-i18n="settings">核心设置</h3>
                <button class="modal-close" onclick="closeSettings()">×</button>
            </div>
            <div class="setting-group">
                <div class="setting-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                    <label data-i18n="sys_prompt">System Prompt</label>
                    <textarea id="promptInput" class="setting-textarea" oninput="autoSaveSettings()">你是一个全渠道智能客服。你可以调用 search_knowledge 工具查询公司信息。请用简短、专业的中文回答。</textarea>
                </div>
                <div class="setting-item">
                    <label data-i18n="voice_select">大模型音色</label>
                    <select id="voiceInput" onchange="autoSaveSettings()">
                        <option value="alloy">Alloy (中性)</option>
                        <option value="echo">Echo (男声)</option>
                        <option value="nova" selected>Nova (女声)</option>
                        <option value="shimmer">Shimmer (清脆女声)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Recording Overlay -->
    <div class="recording-overlay" id="recordingOverlay">
        <div class="recording-wave">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div style="font-size: 14px; font-weight: 500;" data-i18n="release_to_send">松开 发送</div>
    </div>

    <!-- Incoming Call UI -->
    <div class="incoming-call-ui" id="incomingCallUI">
        <div style="text-align: center; margin-top: 40px;">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Omni" class="incoming-avatar">
            <div class="incoming-title" data-i18n="incoming_title">OmniFlow AI</div>
            <div class="incoming-desc" data-i18n="incoming_desc">邀请你进行语音通话...</div>
        </div>
        <div class="incoming-actions">
            <div class="action-btn-wrapper">
                <button class="call-btn danger" onclick="declineCall()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(135deg);"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </button>
                <span data-i18n="decline">拒绝</span>
            </div>
            <div class="action-btn-wrapper">
                <button class="call-btn success" onclick="acceptCall()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </button>
                <span data-i18n="accept">接听</span>
            </div>
        </div>
    </div>

</div>

<script>
    // --- i18n & Theme Logic ---
    const dict = {
        zh: {
            title: "OmniFlow AI",
            sys_welcome: "随时发送文字、图片，或发起语音/视频通话",
            placeholder: "发消息...",
            send: "发送",
            album: "相册",
            voice_call: "语音通话",
            video_call: "视频通话",
            simulate_call: "模拟来电",
            calling: "正在呼叫...",
            connecting: "连接中...",
            connected: "已接通",
            settings: "核心设置",
            sys_prompt: "System Prompt",
            voice_select: "大模型音色",
            save: "保存",
            cancel: "取消",
            hold_to_talk: "按住 说话",
            release_to_end: "松开 结束",
            release_to_send: "松开 发送",
            incoming_title: "OmniFlow AI",
            incoming_desc: "邀请你进行语音通话...",
            decline: "拒绝",
            accept: "接听"
        },
        en: {
            title: "OmniFlow AI",
            sys_welcome: "Send text, images, or start a voice/video call anytime",
            placeholder: "Message...",
            send: "Send",
            album: "Album",
            voice_call: "Voice Call",
            video_call: "Video Call",
            simulate_call: "Simulate Call",
            calling: "Calling...",
            connecting: "Connecting...",
            connected: "Connected",
            settings: "Settings",
            sys_prompt: "System Prompt",
            voice_select: "Voice Model",
            save: "Save",
            cancel: "Cancel",
            hold_to_talk: "Hold to Talk",
            release_to_end: "Release to End",
            release_to_send: "Release to Send",
            incoming_title: "OmniFlow AI",
            incoming_desc: "Incoming voice call...",
            decline: "Decline",
            accept: "Accept"
        }
    };
    let currentLang = 'zh';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = dict[lang][el.getAttribute('data-i18n')];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            el.setAttribute('placeholder', dict[lang][el.getAttribute('data-i18n-placeholder')]);
        });
    }

    document.getElementById('langBtn').onclick = () => {
        setLang(currentLang === 'zh' ? 'en' : 'zh');
    };

    document.getElementById('themeBtn').onclick = () => {
        const root = document.documentElement;
        if (root.getAttribute('data-theme') === 'light') {
            root.removeAttribute('data-theme');
        } else {
            root.setAttribute('data-theme', 'light');
        }
    };

    // --- UI Interactions ---
    const msgInput = document.getElementById('msgInput');
    const plusBtn = document.getElementById('plusBtn');
    const sendBtn = document.getElementById('sendBtn');
    const actionPanel = document.getElementById('actionPanel');
    const chatHistory = document.getElementById('chatHistory');
    const subtitle = document.getElementById('subtitle');
    let subtitleTimeout;

    // Mode Toggle
    const modeToggleBtn = document.getElementById('modeToggleBtn');
    const textInputWrapper = document.getElementById('textInputWrapper');
    const voiceBtn = document.getElementById('voiceBtn');
    const micIcon = document.getElementById('micIcon');
    const kbdIcon = document.getElementById('kbdIcon');
    let isVoiceMode = false;

    modeToggleBtn.onclick = () => {
        isVoiceMode = !isVoiceMode;
        if (isVoiceMode) {
            micIcon.style.display = 'none';
            kbdIcon.style.display = 'block';
            textInputWrapper.style.display = 'none';
            voiceBtn.style.display = 'flex';
            plusBtn.style.display = 'flex';
            sendBtn.style.display = 'none';
            actionPanel.style.display = 'none';
        } else {
            micIcon.style.display = 'block';
            kbdIcon.style.display = 'none';
            textInputWrapper.style.display = 'flex';
            voiceBtn.style.display = 'none';
            msgInput.dispatchEvent(new Event('input'));
        }
    };

    // Push to Talk
    const recordingOverlay = document.getElementById('recordingOverlay');
    let isRecording = false;

    async function startRecording(e) {
        e.preventDefault();
        if (isRecording || isCallActive) return;
        isRecording = true;
        voiceBtn.classList.add('active');
        voiceBtn.innerText = dict[currentLang].release_to_end;
        recordingOverlay.classList.add('active');

        const success = await ensureConnection(true, false);
        if (success && callObject) {
            callObject.setLocalAudio(true);
        }
    }

    function stopRecording(e) {
        e.preventDefault();
        if (!isRecording) return;
        isRecording = false;
        voiceBtn.classList.remove('active');
        voiceBtn.innerText = dict[currentLang].hold_to_talk;
        recordingOverlay.classList.remove('active');

        if (callObject && !isCallActive) {
            callObject.setLocalAudio(false);
        }
    }

    voiceBtn.addEventListener('mousedown', startRecording);
    voiceBtn.addEventListener('touchstart', startRecording, {passive: false});
    window.addEventListener('mouseup', stopRecording);
    window.addEventListener('touchend', stopRecording);

    // Toggle Send/Plus button based on input
    msgInput.addEventListener('input', () => {
        if (msgInput.innerText.trim().length > 0) {
            plusBtn.style.display = 'none';
            sendBtn.style.display = 'block';
        } else {
            plusBtn.style.display = 'flex';
            sendBtn.style.display = 'none';
        }
    });

    // Handle Enter key
    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSendText();
        }
    });

    plusBtn.onclick = () => {
        actionPanel.style.display = actionPanel.style.display === 'grid' ? 'none' : 'grid';
    };

    // Click outside to close action panel
    document.body.addEventListener('click', (e) => {
        if (!e.target.closest('.bottom-bar')) {
            actionPanel.style.display = 'none';
        }
    });

    document.getElementById('settingsBtn').onclick = () => {
        const overlay = document.getElementById('settingsOverlay');
        overlay.style.display = 'flex';
        // Trigger reflow for animation
        void overlay.offsetWidth;
        overlay.classList.add('show');
    };

    document.getElementById('settingsOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'settingsOverlay') {
            closeSettings();
        }
    });

    function closeSettings() {
        const overlay = document.getElementById('settingsOverlay');
        overlay.classList.remove('show');
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 300); // match CSS transition
    }

    function autoSaveSettings() {
        localStorage.setItem('omniflow_prompt', document.getElementById('promptInput').value);
        localStorage.setItem('omniflow_voice', document.getElementById('voiceInput').value);
    }

    window.onload = () => {
        setLang('zh');
        if (localStorage.getItem('omniflow_prompt')) document.getElementById('promptInput').value = localStorage.getItem('omniflow_prompt');
        if (localStorage.getItem('omniflow_voice')) document.getElementById('voiceInput').value = localStorage.getItem('omniflow_voice');
    };

    function appendMessage(role, text, imgBase64 = null) {
        const row = document.createElement('div');
        row.className = `chat-row ${role}`;
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = role === 'user' ? '<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix">' : '<img src="https://api.dicebear.com/7.x/bottts/svg?seed=Omni">';
        
        const bubbleWrap = document.createElement('div');
        bubbleWrap.className = 'bubble-wrapper';
        
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        if (text) bubble.innerText = text;
        if (imgBase64) {
            const img = document.createElement('img');
            img.src = imgBase64;
            img.className = 'chat-image';
            bubble.appendChild(img);
        }
        
        bubbleWrap.appendChild(bubble);
        row.appendChild(avatar);
        row.appendChild(bubbleWrap);
        
        chatHistory.appendChild(row);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function showSubtitle(text, role) {
        // Only show subtitles if we are in an active full call
        if (!isCallActive) return;
        subtitle.innerText = text;
        subtitle.style.color = role === 'user' ? '#95ec69' : '#fff';
        subtitle.style.opacity = '1';
        clearTimeout(subtitleTimeout);
        subtitleTimeout = setTimeout(() => { subtitle.style.opacity = '0'; }, 3000);
    }

    // --- WebRTC Core Logic (Implicit & Explicit) ---
    let callObject = null;
    let isConnected = false;
    let isCallActive = false;
    let isMicMuted = false;
    let isCamOn = false;

    async function ensureConnection(audio = false, video = false) {
        if (isConnected && callObject) return true;
        
        try {
            document.getElementById('callStatus').innerText = dict[currentLang].connecting;
            const res = await fetch('/connect', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: document.getElementById('promptInput').value.trim(),
                    voice: document.getElementById('voiceInput').value 
                })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error);

            callObject = window.DailyIframe.createCallObject({
                dailyConfig: { experimentalChromeVideoMuteLightOff: true }
            });
            
            setupDailyEvents();
            
            await callObject.join({ url: data.room_url, token: data.token });
            isConnected = true;
            
            // Only request media if explicitly asked
            if (audio || video) {
                await navigator.mediaDevices.getUserMedia({ audio: audio, video: video });
                callObject.setLocalAudio(audio);
                callObject.setLocalVideo(video);
            } else {
                callObject.setLocalAudio(false);
                callObject.setLocalVideo(false);
            }
            return true;
        } catch (e) {
            console.error("Connection failed:", e);
            alert("Connection failed: " + e.message);
            return false;
        }
    }

    function setupDailyEvents() {
        callObject.on('joined-meeting', () => {
            document.getElementById('callStatus').innerText = dict[currentLang].connected;
        });

        callObject.on('app-message', (e) => {
            if (e.data && e.data.type === 'text') {
                appendMessage('agent', e.data.content);
            } else if (e.data && e.data.type === 'transcription' && isCallActive) {
                showSubtitle(e.data.text, e.data.role);
            }
        });

        callObject.on('track-started', (e) => {
            if (e.track.kind === 'video') {
                const el = e.participant.local ? document.getElementById('localVideoCall') : document.getElementById('remoteVideo');
                el.srcObject = new MediaStream([e.track]);
                el.style.display = 'block';
                if (!e.participant.local) document.getElementById('callOrb').style.display = 'none';
            }
        });

        callObject.on('track-stopped', (e) => {
            if (e.track.kind === 'video') {
                const el = e.participant.local ? document.getElementById('localVideoCall') : document.getElementById('remoteVideo');
                el.style.display = 'none';
                if (!e.participant.local) document.getElementById('callOrb').style.display = 'block';
            }
        });
    }

    // --- Action Handlers ---

    // Send Text (Implicit Connection)
    async function handleSendText() {
        const text = msgInput.innerText.trim();
        if (!text) return;
        
        msgInput.innerText = '';
        msgInput.dispatchEvent(new Event('input')); // trigger UI reset
        actionPanel.style.display = 'none';
        
        appendMessage('user', text);
        
        const success = await ensureConnection(false, false);
        if (success) {
            callObject.sendAppMessage({ type: 'text', content: text }, '*');
        }
    }
    sendBtn.onclick = handleSendText;

    // Send Image
    document.getElementById('uploadAction').onclick = () => {
        document.getElementById('fileInput').click();
    };
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        actionPanel.style.display = 'none';

        const reader = new FileReader();
        reader.onload = async (event) => {
            const base64Data = event.target.result;
            appendMessage('user', null, base64Data);
            
            const success = await ensureConnection(false, false);
            if (success) {
                callObject.sendAppMessage({ type: 'image', filename: file.name, content: base64Data }, '*');
            }
        };
        reader.readAsDataURL(file);
        e.target.value = ''; // reset
    };

    // Voice / Video Call
    async function startCall(video = false) {
        actionPanel.style.display = 'none';
        document.getElementById('callOverlay').classList.add('active');
        isCallActive = true;
        document.getElementById('floatingCall').style.display = 'none';
        document.getElementById('callStatus').innerText = dict[currentLang].calling;
        
        isCamOn = video;
        document.getElementById('camToggleBtn').style.background = isCamOn ? '#ffffff' : 'rgba(255,255,255,0.2)';
        document.getElementById('camToggleBtn').style.color = isCamOn ? '#000' : '#fff';
        
        const success = await ensureConnection(true, video);
        if (success && isConnected) {
            await navigator.mediaDevices.getUserMedia({ audio: true, video: video });
            callObject.setLocalAudio(true);
            callObject.setLocalVideo(video);
            isMicMuted = false;
            document.getElementById('muteIcon').style.display = 'block';
            document.getElementById('unmuteIcon').style.display = 'none';
            document.getElementById('muteBtn').style.background = 'rgba(255,255,255,0.2)';
        } else {
            hideCallOverlay();
        }
    }

    document.getElementById('voiceCallAction').onclick = () => startCall(false);
    document.getElementById('videoCallAction').onclick = () => startCall(true);

    // Simulate Incoming Call
    document.getElementById('simulateCallAction').onclick = () => {
        actionPanel.style.display = 'none';
        setTimeout(() => {
            document.getElementById('incomingCallUI').classList.add('active');
            document.getElementById('incomingCallUI').style.display = 'flex';
        }, 2000);
    };

    function acceptCall() {
        document.getElementById('incomingCallUI').classList.remove('active');
        setTimeout(() => {
            document.getElementById('incomingCallUI').style.display = 'none';
            startCall(false);
        }, 300);
    }

    function declineCall() {
        document.getElementById('incomingCallUI').classList.remove('active');
        setTimeout(() => {
            document.getElementById('incomingCallUI').style.display = 'none';
        }, 300);
    }

    // Call Controls
    function hideCallOverlay() {
        document.getElementById('callOverlay').classList.remove('active');
        if (isCallActive) {
            document.getElementById('floatingCall').style.display = 'flex';
        }
    }

    function showCallOverlay() {
        document.getElementById('callOverlay').classList.add('active');
        document.getElementById('floatingCall').style.display = 'none';
    }

    document.getElementById('muteBtn').onclick = () => {
        isMicMuted = !isMicMuted;
        callObject.setLocalAudio(!isMicMuted);
        if (isMicMuted) {
            document.getElementById('muteIcon').style.display = 'none';
            document.getElementById('unmuteIcon').style.display = 'block';
            document.getElementById('muteBtn').style.background = 'rgba(255,0,0,0.5)';
        } else {
            document.getElementById('muteIcon').style.display = 'block';
            document.getElementById('unmuteIcon').style.display = 'none';
            document.getElementById('muteBtn').style.background = 'rgba(255,255,255,0.2)';
        }
    };

    document.getElementById('camToggleBtn').onclick = () => {
        isCamOn = !isCamOn;
        callObject.setLocalVideo(isCamOn);
        document.getElementById('camToggleBtn').style.background = isCamOn ? '#ffffff' : 'rgba(255,255,255,0.2)';
        document.getElementById('camToggleBtn').style.color = isCamOn ? '#000' : '#fff';
    };

    document.getElementById('hangupBtn').onclick = () => {
        isCallActive = false;
        if (callObject) {
            callObject.leave();
            callObject.destroy();
            callObject = null;
            isConnected = false;
        }
        document.getElementById('callOverlay').classList.remove('active');
        document.getElementById('floatingCall').style.display = 'none';
        document.getElementById('localVideoCall').style.display = 'none';
        document.getElementById('remoteVideo').style.display = 'none';
        document.getElementById('callOrb').style.display = 'block';
        appendMessage('sys', '通话已结束');
    };

</script>
</body>
</html>
