<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OmniFlow AI (全流智能客席)</title>
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    <link rel="icon" href="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=A%20highly%20aesthetic%2C%20colorful%2C%20glowing%20orb%20or%20sound%20wave%20abstract%20logo%20for%20an%20AI%20communication%20platform%20named%20OmniFlow%2C%20dark%20background%2C%20neon%20blue%20and%20purple%20gradients%2C%20modern%20tech%20startup%20style%2C%203d%20render&image_size=square">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: white; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Top Navigation */
        .top-nav { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 100; }
        .icon-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 18px; backdrop-filter: blur(10px); color: white; }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        /* Main Layout */
        .app-container { display: flex; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; gap: 20px; }
        
        /* Left: Visual Panel */
        .visual-panel { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .logo-container { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 10px; }
        .logo { width: 32px; height: 32px; border-radius: 8px; }
        .logo-text { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; color: #fff; }
        
        .orb { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #4a90e2, #000); box-shadow: 0 0 20px #4a90e2; animation: pulse 2s infinite alternate; display: none; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 10px #4a90e2; } 100% { transform: scale(1.05); box-shadow: 0 0 40px #4a90e2; } }
        
        #localVideo { position: absolute; bottom: 20px; left: 20px; width: 160px; height: 120px; background: #000; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); display: none; object-fit: cover; }
        #status { position: absolute; bottom: 20px; font-size: 14px; color: #888; }

        /* Right: Chat Panel */
        .chat-panel { width: 450px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .sys-msg { align-self: center; font-size: 12px; color: #666; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 10px; }
        
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .chat-user { align-self: flex-end; background: #0070f3; color: white; border-bottom-right-radius: 4px; }
        .chat-agent { align-self: flex-start; background: rgba(255,255,255,0.1); color: #eaeaea; border-bottom-left-radius: 4px; }
        .chat-image { max-width: 200px; border-radius: 8px; margin-top: 8px; display: block; }

        .chat-input-area { padding: 15px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        #msgInput { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px 15px; color: white; font-size: 14px; outline: none; transition: 0.2s; }
        #msgInput:focus { border-color: #0070f3; background: rgba(255,255,255,0.1); }
        .primary-btn { padding: 10px 20px; font-size: 14px; font-weight: 500; border-radius: 20px; background: #0070f3; color: white; border: none; cursor: pointer; transition: 0.2s; }
        .primary-btn:hover { background: #0051a2; }
        .primary-btn:disabled { background: #333; cursor: not-allowed; color: #888; }
        
        .full-width { width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px; width: 400px; max-width: 90vw; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(20px); transform: translateY(20px); transition: transform 0.3s; }
        .modal.show { transform: translateY(0); }
        .modal h2 { margin-top: 0; margin-bottom: 20px; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
        .modal-close:hover { color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #bbb; }
        .form-group textarea, .form-group select { width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; padding: 12px; font-family: inherit; outline: none; }
        .form-group textarea { height: 120px; resize: vertical; }
        .form-group textarea:focus, .form-group select:focus { border-color: #0070f3; }
        .save-btn { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; }
        
        /* Subtitle Overlay */
        #subtitleOverlay { position: absolute; bottom: 40px; width: 80%; text-align: center; font-size: 20px; font-weight: 500; color: white; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 12px; backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 50; }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; padding: 10px; }
            .visual-panel { min-height: 40vh; flex: none; }
            .chat-panel { width: 100%; flex: 1; }
            .logo-container { top: 10px; left: 10px; }
            .top-nav { top: 10px; right: 10px; }
            #localVideo { width: 100px; height: 75px; bottom: 10px; left: 10px; }
            #subtitleOverlay { bottom: 20px; font-size: 16px; width: 90%; }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="icon-btn" id="historyBtn" title="通话记录">📜</div>
        <div class="icon-btn" id="settingsBtn" title="系统设置">⚙️</div>
    </div>

    <div class="app-container">
        <!-- 左侧：视觉交互区 -->
        <div class="visual-panel">
            <div class="logo-container">
                <img src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=A%20highly%20aesthetic%2C%20colorful%2C%20glowing%20orb%20or%20sound%20wave%20abstract%20logo%20for%20an%20AI%20communication%20platform%20named%20OmniFlow%2C%20dark%20background%2C%20neon%20blue%20and%20purple%20gradients%2C%20modern%20tech%20startup%20style%2C%203d%20render&image_size=square" class="logo">
                <div class="logo-text">OmniFlow</div>
            </div>
            
            <div class="orb" id="orb"></div>
            <video id="localVideo" autoplay muted playsinline></video>
            <div id="subtitleOverlay"></div>
            <div id="status">等待连接...</div>
        </div>

        <!-- 右侧：全模态聊天区 -->
        <div class="chat-panel">
            <div class="chat-history" id="chatHistory">
                <div class="sys-msg">请点击下方按钮启动 OmniFlow 全渠道引擎</div>
            </div>
            
            <div class="chat-input-area">
                <button id="startBtn" class="primary-btn full-width">🚀 建立全模态连接 (WebRTC)</button>
                
                <div class="input-row" id="controlRow" style="display:none; margin-top:10px;">
                    <button class="icon-btn" id="camBtn" title="开启/关闭摄像头" style="width:36px; height:36px; font-size:14px;">📹</button>
                    
                    <input type="file" id="fileInput" style="display:none" accept="image/*">
                    <button class="icon-btn" id="uploadBtn" title="发送图片/文件" style="width:36px; height:36px; font-size:14px;">📎</button>
                    
                    <input type="text" id="msgInput" placeholder="输入文字打断 AI，或发送文件...">
                    <button class="primary-btn" id="sendBtn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsOverlay">
        <div class="modal" id="settingsModal">
            <button class="modal-close" onclick="closeModal('settings')">&times;</button>
            <h2>Agent 核心设置</h2>
            <div class="form-group">
                <label>System Prompt (系统提示词)</label>
                <textarea id="promptInput">你是一个全渠道智能客服。你可以调用 search_knowledge 工具查询公司信息。请用简短、专业的中文回答。</textarea>
            </div>
            <div class="form-group">
                <label>大模型音色 (Voice)</label>
                <select id="voiceInput">
                    <option value="alloy">Alloy (中性)</option>
                    <option value="echo">Echo (男声)</option>
                    <option value="fable">Fable (英伦男声)</option>
                    <option value="onyx">Onyx (深沉男声)</option>
                    <option value="nova" selected>Nova (女声)</option>
                    <option value="shimmer">Shimmer (清脆女声)</option>
                </select>
            </div>
            <button class="save-btn" onclick="saveSettings()">保存配置</button>
        </div>
    </div>

    <script>
        let callObject;
        let isCamOn = false;
        let subtitleTimeout;
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const orb = document.getElementById('orb');
        const chatHistory = document.getElementById('chatHistory');
        const msgInput = document.getElementById('msgInput');
        const controlRow = document.getElementById('controlRow');
        const promptInput = document.getElementById('promptInput');
        const voiceInput = document.getElementById('voiceInput');
        const subtitleOverlay = document.getElementById('subtitleOverlay');

        // Load settings
        window.onload = () => {
            const savedPrompt = localStorage.getItem('omniflow_prompt');
            const savedVoice = localStorage.getItem('omniflow_voice');
            if (savedPrompt) promptInput.value = savedPrompt;
            if (savedVoice) voiceInput.value = savedVoice;
        };

        function showSubtitle(text, role) {
            subtitleOverlay.innerText = text;
            subtitleOverlay.style.color = role === 'user' ? '#4a90e2' : '#fff';
            subtitleOverlay.style.opacity = '1';
            
            clearTimeout(subtitleTimeout);
            subtitleTimeout = setTimeout(() => {
                subtitleOverlay.style.opacity = '0';
            }, 3000);
        }

        function appendMessage(sender, text, imageUrl = null) {
            const div = document.createElement('div');
            div.className = `chat-bubble chat-${sender}`;
            if (text) div.innerText = text;
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.className = 'chat-image';
                div.appendChild(img);
            }
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // --- WebRTC Logic ---
        startBtn.onclick = async () => {
            startBtn.disabled = true;
            startBtn.innerText = "正在分配 Agent 节点...";
            
            try {
                const res = await fetch('/connect', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: promptInput.value.trim(),
                        voice: voiceInput.value 
                    })
                });
                const data = await res.json();
                
                if(data.error) throw new Error(data.error);

                status.innerText = "正在建立低延迟音视频通道...";
                callObject = window.DailyIframe.createCallObject({
                    dailyConfig: { experimentalChromeVideoMuteLightOff: true }
                });
                
                callObject.on('joined-meeting', () => {
                    status.innerText = "已连接！您可以说话、打字、发图或开视频。";
                    startBtn.style.display = 'none';
                    controlRow.style.display = 'flex';
                    orb.style.display = 'block';
                    appendMessage('agent', '您好，我是 OmniFlow，已为您开启多模态通道。');
                });
                
                // Handle Video Track
                callObject.on('track-started', (e) => {
                    if (e.participant.local && e.track.kind === 'video') {
                        const videoEl = document.getElementById('localVideo');
                        videoEl.srcObject = new MediaStream([e.track]);
                        videoEl.style.display = 'block';
                    }
                });

                callObject.on('track-stopped', (e) => {
                    if (e.participant.local && e.track.kind === 'video') {
                        document.getElementById('localVideo').style.display = 'none';
                    }
                });

                // Handle incoming Data Channel messages
                callObject.on('app-message', (e) => {
                    if (e.data && e.data.type === 'text') {
                        appendMessage('agent', e.data.content);
                    } else if (e.data && e.data.type === 'transcription') {
                        showSubtitle(e.data.text, e.data.role);
                    }
                });

                await callObject.join({ url: data.room_url, token: data.token });
                await navigator.mediaDevices.getUserMedia({ audio: true });
                callObject.setLocalAudio(true);
                callObject.setLocalVideo(false); // Default off
                
            } catch (e) {
                status.innerText = "系统异常: " + e.message;
                startBtn.disabled = false;
                startBtn.innerText = "重新连接";
            }
        };

        // --- Multi-modal Controls ---
        
        // 1. Video Toggle
        document.getElementById('camBtn').onclick = () => {
            isCamOn = !isCamOn;
            callObject.setLocalVideo(isCamOn);
            document.getElementById('camBtn').style.background = isCamOn ? '#0070f3' : '';
        };

        // 2. Text Chat Send
        document.getElementById('sendBtn').onclick = () => {
            const text = msgInput.value.trim();
            if (!text || !callObject) return;
            
            appendMessage('user', text);
            // Send via Data Channel
            callObject.sendAppMessage({ type: 'text', content: text }, '*');
            msgInput.value = '';
        };

        msgInput.onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('sendBtn').click();
        };

        // 3. File/Image Upload
        document.getElementById('uploadBtn').onclick = () => {
            document.getElementById('fileInput').click();
        };

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const base64Data = event.target.result;
                appendMessage('user', null, base64Data);
                
                if (callObject) {
                    // Send large chunks via Data Channel or API
                    // Note: WebRTC data channels have size limits per message. 
                    // In a prod app, we'd chunk it or upload to S3 and send URL.
                    // For demo, we send a lightweight event.
                    callObject.sendAppMessage({ 
                        type: 'image', 
                        filename: file.name, 
                        content: base64Data 
                    }, '*');
                }
            };
            reader.readAsDataURL(file);
        };

        // Modal Logic
        function openModal(type) {
            const overlay = document.getElementById(type + 'Overlay');
            const modal = document.getElementById(type + 'Modal');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; modal.classList.add('show'); }, 10);
        }
        function closeModal(type) {
            const overlay = document.getElementById(type + 'Overlay');
            const modal = document.getElementById(type + 'Modal');
            overlay.style.opacity = '0';
            modal.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300);
        }
        document.getElementById('settingsBtn').onclick = () => openModal('settings');
        function saveSettings() {
            localStorage.setItem('omniflow_prompt', promptInput.value);
            localStorage.setItem('omniflow_voice', voiceInput.value);
            closeModal('settings');
        }
    </script>
</body>
</html>
