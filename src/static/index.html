<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniFlow AI</title>
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    <link rel="icon" href="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=A%20highly%20aesthetic%2C%20colorful%2C%20glowing%20orb%20or%20sound%20wave%20abstract%20logo%20for%20an%20AI%20communication%20platform%20named%20OmniFlow%2C%20dark%20background%2C%20neon%20blue%20and%20purple%20gradients%2C%20modern%20tech%20startup%20style%2C%203d%20render&image_size=square">
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-body: #000000;
            --bg-container: #111111;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: rgba(255,255,255,0.1);
            --header-bg: rgba(17,17,17,0.85);
            --chat-bg: #0a0a0a;
            --bubble-user: #07c160; /* WeChat Green */
            --bubble-user-text: #ffffff;
            --bubble-agent: #2c2c2c;
            --bubble-agent-text: #ffffff;
            --bottom-bar-bg: #1a1a1a;
            --input-bg: #2c2c2c;
            --icon-color: #ffffff;
            --hover-bg: rgba(255,255,255,0.1);
            --call-bg: #1a1a1a;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --text-main: #000000;
            --text-muted: #999999;
            --border-color: rgba(0,0,0,0.1);
            --header-bg: rgba(245,245,245,0.85);
            --chat-bg: #f5f5f5;
            --bubble-user: #95ec69; /* WeChat Green Light */
            --bubble-user-text: #000000;
            --bubble-agent: #ffffff;
            --bubble-agent-text: #000000;
            --bottom-bar-bg: #f5f5f5;
            --input-bg: #ffffff;
            --icon-color: #333333;
            --hover-bg: rgba(0,0,0,0.05);
            --call-bg: #222222; /* Call UI is usually always dark */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s;
        }

        .mobile-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: var(--bg-container);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Header */
        .header {
            height: 56px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }
        .header-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        .header-actions { display: flex; gap: 10px; }
        .icon-btn { 
            background: transparent; border: none; color: var(--icon-color); 
            font-size: 20px; cursor: pointer; padding: 5px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .icon-btn:hover { background: var(--hover-bg); }
        .logo { width: 24px; height: 24px; border-radius: 6px; }

        /* Chat Area */
        .chat-area {
            flex: 1;
            background: var(--chat-bg);
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sys-msg { align-self: center; font-size: 12px; color: var(--text-muted); background: var(--hover-bg); padding: 4px 12px; border-radius: 12px; }
        
        .chat-row { display: flex; gap: 10px; align-items: flex-start; }
        .chat-row.user { flex-direction: row-reverse; }
        
        .avatar { width: 40px; height: 40px; border-radius: 6px; background: #ddd; flex-shrink: 0; overflow: hidden;}
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .bubble-wrapper { display: flex; flex-direction: column; max-width: 70%; }
        .chat-row.user .bubble-wrapper { align-items: flex-end; }
        
        .chat-bubble { 
            padding: 10px 14px; 
            border-radius: 8px; 
            font-size: 15px; 
            line-height: 1.5; 
            word-wrap: break-word; 
            position: relative;
        }
        .chat-row.user .chat-bubble { 
            background: var(--bubble-user); 
            color: var(--bubble-user-text); 
            border-top-right-radius: 2px;
        }
        .chat-row.agent .chat-bubble { 
            background: var(--bubble-agent); 
            color: var(--bubble-agent-text); 
            border-top-left-radius: 2px;
        }
        .chat-image { max-width: 100%; border-radius: 6px; margin-top: 5px; display: block; }

        /* Bottom Bar */
        .bottom-bar {
            background: var(--bottom-bar-bg);
            border-top: 1px solid var(--border-color);
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-row { display: flex; align-items: flex-end; gap: 10px; }
        .input-box {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            min-height: 20px;
            max-height: 100px;
            overflow-y: auto;
            word-break: break-all;
        }
        .input-box:empty:before { content: attr(placeholder); color: var(--text-muted); pointer-events: none; display: block; }
        
        .send-btn {
            background: #07c160; color: white; border: none; border-radius: 6px;
            padding: 8px 16px; font-size: 14px; cursor: pointer; height: 38px;
            display: none; font-weight: 500;
        }
        
        .action-panel {
            display: none;
            padding: 15px 0 5px 0;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            border-top: 1px solid var(--border-color);
        }
        .action-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; color: var(--text-muted); font-size: 12px;
        }
        .action-icon {
            width: 56px; height: 56px; background: var(--input-bg); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            border: 1px solid var(--border-color);
        }

        /* Call Overlay (Native Call Style) */
        .call-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--call-bg); z-index: 200;
            display: none; flex-direction: column; color: white;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .call-overlay.active { transform: translateY(0); }
        
        .call-header { padding: 20px; display: flex; justify-content: space-between; }
        .call-header button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        
        .call-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .orb { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #4a90e2, #000); box-shadow: 0 0 20px #4a90e2; animation: pulse 2s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 10px #4a90e2; } 100% { transform: scale(1.05); box-shadow: 0 0 40px #4a90e2; } }
        
        #remoteVideo { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 1;}
        #localVideoCall { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; background: #000; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); object-fit: cover; z-index: 5; display: none;}
        
        .subtitle {
            position: absolute; bottom: 30px; width: 90%; text-align: center;
            font-size: 18px; font-weight: 500; color: white; text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 12px; backdrop-filter: blur(5px);
            opacity: 0; transition: opacity 0.3s; z-index: 10;
        }

        .call-footer { padding: 40px 30px; display: flex; justify-content: space-around; align-items: center; z-index: 10;}
        .call-btn { width: 64px; height: 64px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; color: white; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        .call-btn.danger { background: #ff3b30; }

        /* Settings Modal */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 300; display: none; align-items: center; justify-content: center; }
        .modal { background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; width: 85%; color: var(--text-main); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        .form-group textarea, .form-group select { width: 100%; box-sizing: border-box; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); padding: 10px; font-family: inherit; outline: none; }
        .form-group textarea { height: 100px; resize: vertical; }
        .primary-btn { width: 100%; padding: 12px; background: #07c160; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 500; }
        
        /* Floating Mini Call */
        .floating-call {
            position: absolute; top: 70px; right: 15px; background: #07c160; color: white;
            padding: 8px 12px; border-radius: 20px; font-size: 13px; display: none;
            align-items: center; gap: 6px; cursor: pointer; z-index: 90; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

    </style>
</head>
<body>

<div class="mobile-container">
    
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <img src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=A%20highly%20aesthetic%2C%20colorful%2C%20glowing%20orb%20or%20sound%20wave%20abstract%20logo%20for%20an%20AI%20communication%20platform%20named%20OmniFlow%2C%20dark%20background%2C%20neon%20blue%20and%20purple%20gradients%2C%20modern%20tech%20startup%20style%2C%203d%20render&image_size=square" class="logo">
            <span data-i18n="title">OmniFlow AI</span>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="langBtn" title="Language">🌐</button>
            <button class="icon-btn" id="themeBtn" title="Theme">🌓</button>
            <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
        </div>
    </div>

    <!-- Floating Call Indicator -->
    <div class="floating-call" id="floatingCall" onclick="showCallOverlay()">
        📞 <span data-i18n="calling">通话中...</span>
    </div>

    <!-- Chat History -->
    <div class="chat-area" id="chatHistory">
        <div class="sys-msg" data-i18n="sys_welcome">随时发送文字、图片，或发起语音/视频通话</div>
    </div>

    <!-- Bottom Input Bar -->
    <div class="bottom-bar">
        <div class="input-row">
            <div class="input-box" id="msgInput" contenteditable="true" data-i18n-placeholder="placeholder"></div>
            <button class="icon-btn" id="plusBtn" style="font-size: 26px;">⊕</button>
            <button class="send-btn" id="sendBtn" data-i18n="send">发送</button>
        </div>
        <div class="action-panel" id="actionPanel">
            <div class="action-item" id="uploadAction">
                <div class="action-icon">🖼️</div>
                <span data-i18n="album">相册</span>
                <input type="file" id="fileInput" style="display:none" accept="image/*">
            </div>
            <div class="action-item" id="voiceCallAction">
                <div class="action-icon">📞</div>
                <span data-i18n="voice_call">语音通话</span>
            </div>
            <div class="action-item" id="videoCallAction">
                <div class="action-icon">📹</div>
                <span data-i18n="video_call">视频通话</span>
            </div>
        </div>
    </div>

    <!-- Call Overlay -->
    <div class="call-overlay" id="callOverlay">
        <div class="call-header">
            <button onclick="hideCallOverlay()">⤓</button>
            <div id="callStatus" style="font-size: 14px; opacity: 0.8; margin-top: 5px;" data-i18n="connecting">连接中...</div>
            <div style="width: 24px;"></div> <!-- Spacer -->
        </div>
        <div class="call-body">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideoCall" autoplay muted playsinline></video>
            <div class="orb" id="callOrb"></div>
            <div class="subtitle" id="subtitle"></div>
        </div>
        <div class="call-footer">
            <button class="call-btn" id="muteBtn">🎤</button>
            <button class="call-btn danger" id="hangupBtn">📞</button>
            <button class="call-btn" id="camToggleBtn">📷</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsOverlay" style="display:none;">
        <div class="modal">
            <h3 style="margin-top:0;" data-i18n="settings">核心设置</h3>
            <div class="form-group">
                <label data-i18n="sys_prompt">System Prompt</label>
                <textarea id="promptInput">你是一个全渠道智能客服。你可以调用 search_knowledge 工具查询公司信息。请用简短、专业的中文回答。</textarea>
            </div>
            <div class="form-group">
                <label data-i18n="voice_select">大模型音色</label>
                <select id="voiceInput">
                    <option value="alloy">Alloy (中性)</option>
                    <option value="echo">Echo (男声)</option>
                    <option value="nova" selected>Nova (女声)</option>
                    <option value="shimmer">Shimmer (清脆女声)</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="primary-btn" style="background:#555;" onclick="document.getElementById('settingsOverlay').style.display='none'" data-i18n="cancel">取消</button>
                <button class="primary-btn" onclick="saveSettings()" data-i18n="save">保存</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- i18n & Theme Logic ---
    const dict = {
        zh: {
            title: "OmniFlow AI",
            sys_welcome: "随时发送文字、图片，或发起语音/视频通话",
            placeholder: "发消息...",
            send: "发送",
            album: "相册",
            voice_call: "语音通话",
            video_call: "视频通话",
            calling: "通话中...",
            connecting: "连接中...",
            connected: "已接通",
            settings: "核心设置",
            sys_prompt: "System Prompt",
            voice_select: "大模型音色",
            save: "保存",
            cancel: "取消"
        },
        en: {
            title: "OmniFlow AI",
            sys_welcome: "Send text, images, or start a voice/video call anytime",
            placeholder: "Message...",
            send: "Send",
            album: "Album",
            voice_call: "Voice Call",
            video_call: "Video Call",
            calling: "Calling...",
            connecting: "Connecting...",
            connected: "Connected",
            settings: "Settings",
            sys_prompt: "System Prompt",
            voice_select: "Voice Model",
            save: "Save",
            cancel: "Cancel"
        }
    };
    let currentLang = 'zh';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = dict[lang][el.getAttribute('data-i18n')];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            el.setAttribute('placeholder', dict[lang][el.getAttribute('data-i18n-placeholder')]);
        });
    }

    document.getElementById('langBtn').onclick = () => {
        setLang(currentLang === 'zh' ? 'en' : 'zh');
    };

    document.getElementById('themeBtn').onclick = () => {
        const root = document.documentElement;
        if (root.getAttribute('data-theme') === 'light') {
            root.removeAttribute('data-theme');
        } else {
            root.setAttribute('data-theme', 'light');
        }
    };

    // --- UI Interactions ---
    const msgInput = document.getElementById('msgInput');
    const plusBtn = document.getElementById('plusBtn');
    const sendBtn = document.getElementById('sendBtn');
    const actionPanel = document.getElementById('actionPanel');
    const chatHistory = document.getElementById('chatHistory');
    const subtitle = document.getElementById('subtitle');
    let subtitleTimeout;

    // Toggle Send/Plus button based on input
    msgInput.addEventListener('input', () => {
        if (msgInput.innerText.trim().length > 0) {
            plusBtn.style.display = 'none';
            sendBtn.style.display = 'block';
        } else {
            plusBtn.style.display = 'flex';
            sendBtn.style.display = 'none';
        }
    });

    // Handle Enter key
    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSendText();
        }
    });

    plusBtn.onclick = () => {
        actionPanel.style.display = actionPanel.style.display === 'grid' ? 'none' : 'grid';
    };

    // Click outside to close action panel
    document.body.addEventListener('click', (e) => {
        if (!e.target.closest('.bottom-bar')) {
            actionPanel.style.display = 'none';
        }
    });

    document.getElementById('settingsBtn').onclick = () => {
        document.getElementById('settingsOverlay').style.display = 'flex';
    };

    function saveSettings() {
        localStorage.setItem('omniflow_prompt', document.getElementById('promptInput').value);
        localStorage.setItem('omniflow_voice', document.getElementById('voiceInput').value);
        document.getElementById('settingsOverlay').style.display = 'none';
    }

    window.onload = () => {
        setLang('zh');
        if (localStorage.getItem('omniflow_prompt')) document.getElementById('promptInput').value = localStorage.getItem('omniflow_prompt');
        if (localStorage.getItem('omniflow_voice')) document.getElementById('voiceInput').value = localStorage.getItem('omniflow_voice');
    };

    function appendMessage(role, text, imgBase64 = null) {
        const row = document.createElement('div');
        row.className = `chat-row ${role}`;
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = role === 'user' ? '<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix">' : '<img src="https://api.dicebear.com/7.x/bottts/svg?seed=Omni">';
        
        const bubbleWrap = document.createElement('div');
        bubbleWrap.className = 'bubble-wrapper';
        
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        if (text) bubble.innerText = text;
        if (imgBase64) {
            const img = document.createElement('img');
            img.src = imgBase64;
            img.className = 'chat-image';
            bubble.appendChild(img);
        }
        
        bubbleWrap.appendChild(bubble);
        row.appendChild(avatar);
        row.appendChild(bubbleWrap);
        
        chatHistory.appendChild(row);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function showSubtitle(text, role) {
        subtitle.innerText = text;
        subtitle.style.color = role === 'user' ? '#95ec69' : '#fff';
        subtitle.style.opacity = '1';
        clearTimeout(subtitleTimeout);
        subtitleTimeout = setTimeout(() => { subtitle.style.opacity = '0'; }, 3000);
    }

    // --- WebRTC Core Logic (Implicit & Explicit) ---
    let callObject = null;
    let isConnected = false;
    let isCallActive = false;
    let isMicMuted = false;
    let isCamOn = false;

    async function ensureConnection(audio = false, video = false) {
        if (isConnected && callObject) return true;
        
        try {
            document.getElementById('callStatus').innerText = dict[currentLang].connecting;
            const res = await fetch('/connect', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: document.getElementById('promptInput').value.trim(),
                    voice: document.getElementById('voiceInput').value 
                })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error);

            callObject = window.DailyIframe.createCallObject({
                dailyConfig: { experimentalChromeVideoMuteLightOff: true }
            });
            
            setupDailyEvents();
            
            await callObject.join({ url: data.room_url, token: data.token });
            isConnected = true;
            
            // Only request media if explicitly asked
            if (audio || video) {
                await navigator.mediaDevices.getUserMedia({ audio: audio, video: video });
                callObject.setLocalAudio(audio);
                callObject.setLocalVideo(video);
            } else {
                callObject.setLocalAudio(false);
                callObject.setLocalVideo(false);
            }
            return true;
        } catch (e) {
            console.error("Connection failed:", e);
            alert("Connection failed: " + e.message);
            return false;
        }
    }

    function setupDailyEvents() {
        callObject.on('joined-meeting', () => {
            document.getElementById('callStatus').innerText = dict[currentLang].connected;
        });

        callObject.on('app-message', (e) => {
            if (e.data && e.data.type === 'text') {
                appendMessage('agent', e.data.content);
            } else if (e.data && e.data.type === 'transcription' && isCallActive) {
                showSubtitle(e.data.text, e.data.role);
            }
        });

        callObject.on('track-started', (e) => {
            if (e.track.kind === 'video') {
                const el = e.participant.local ? document.getElementById('localVideoCall') : document.getElementById('remoteVideo');
                el.srcObject = new MediaStream([e.track]);
                el.style.display = 'block';
                if (!e.participant.local) document.getElementById('callOrb').style.display = 'none';
            }
        });

        callObject.on('track-stopped', (e) => {
            if (e.track.kind === 'video') {
                const el = e.participant.local ? document.getElementById('localVideoCall') : document.getElementById('remoteVideo');
                el.style.display = 'none';
                if (!e.participant.local) document.getElementById('callOrb').style.display = 'block';
            }
        });
    }

    // --- Action Handlers ---

    // Send Text (Implicit Connection)
    async function handleSendText() {
        const text = msgInput.innerText.trim();
        if (!text) return;
        
        msgInput.innerText = '';
        msgInput.dispatchEvent(new Event('input')); // trigger UI reset
        actionPanel.style.display = 'none';
        
        appendMessage('user', text);
        
        const success = await ensureConnection(false, false);
        if (success) {
            callObject.sendAppMessage({ type: 'text', content: text }, '*');
        }
    }
    sendBtn.onclick = handleSendText;

    // Send Image
    document.getElementById('uploadAction').onclick = () => {
        document.getElementById('fileInput').click();
    };
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        actionPanel.style.display = 'none';

        const reader = new FileReader();
        reader.onload = async (event) => {
            const base64Data = event.target.result;
            appendMessage('user', null, base64Data);
            
            const success = await ensureConnection(false, false);
            if (success) {
                callObject.sendAppMessage({ type: 'image', filename: file.name, content: base64Data }, '*');
            }
        };
        reader.readAsDataURL(file);
        e.target.value = ''; // reset
    };

    // Voice / Video Call
    async function startCall(video = false) {
        actionPanel.style.display = 'none';
        document.getElementById('callOverlay').classList.add('active');
        isCallActive = true;
        document.getElementById('floatingCall').style.display = 'none';
        
        isCamOn = video;
        document.getElementById('camToggleBtn').style.background = isCamOn ? '#ffffff' : 'rgba(255,255,255,0.2)';
        document.getElementById('camToggleBtn').style.color = isCamOn ? '#000' : '#fff';
        
        const success = await ensureConnection(true, video);
        if (success && isConnected) {
            await navigator.mediaDevices.getUserMedia({ audio: true, video: video });
            callObject.setLocalAudio(true);
            callObject.setLocalVideo(video);
            isMicMuted = false;
            document.getElementById('muteBtn').innerText = '🎤';
        } else {
            hideCallOverlay();
        }
    }

    document.getElementById('voiceCallAction').onclick = () => startCall(false);
    document.getElementById('videoCallAction').onclick = () => startCall(true);

    // Call Controls
    function hideCallOverlay() {
        document.getElementById('callOverlay').classList.remove('active');
        if (isCallActive) {
            document.getElementById('floatingCall').style.display = 'flex';
        }
    }

    function showCallOverlay() {
        document.getElementById('callOverlay').classList.add('active');
        document.getElementById('floatingCall').style.display = 'none';
    }

    document.getElementById('muteBtn').onclick = () => {
        isMicMuted = !isMicMuted;
        callObject.setLocalAudio(!isMicMuted);
        document.getElementById('muteBtn').innerText = isMicMuted ? '🔇' : '🎤';
        document.getElementById('muteBtn').style.background = isMicMuted ? 'rgba(255,0,0,0.5)' : 'rgba(255,255,255,0.2)';
    };

    document.getElementById('camToggleBtn').onclick = () => {
        isCamOn = !isCamOn;
        callObject.setLocalVideo(isCamOn);
        document.getElementById('camToggleBtn').style.background = isCamOn ? '#ffffff' : 'rgba(255,255,255,0.2)';
        document.getElementById('camToggleBtn').style.color = isCamOn ? '#000' : '#fff';
    };

    document.getElementById('hangupBtn').onclick = () => {
        isCallActive = false;
        if (callObject) {
            callObject.leave();
            callObject.destroy();
            callObject = null;
            isConnected = false;
        }
        document.getElementById('callOverlay').classList.remove('active');
        document.getElementById('floatingCall').style.display = 'none';
        document.getElementById('localVideoCall').style.display = 'none';
        document.getElementById('remoteVideo').style.display = 'none';
        document.getElementById('callOrb').style.display = 'block';
        appendMessage('sys', '通话已结束');
    };

</script>
</body>
</html>
